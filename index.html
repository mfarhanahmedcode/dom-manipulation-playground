<!doctype html>
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Manipulation Playground</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="title">DOM Manipulation Playground</h1>

      <div class="paragraph-box">
        <p id="paragraph">This is Paragraph</p>
      </div>

      <div class="section">
        <h3>Change Text</h3>

        <div class="input-group">
          <input type="text" id="textInput" placeholder="Type something..." />

          <button id="changeTextButton">Change Text</button>
        </div>
      </div>

      <div class="section">
        <h3>Change Color</h3>

        <div class="input-group">
          <input type="color" id="colorInput" />

          <button id="changeColorButton">Change Color</button>
          <button id="randomColorButton">Random Color</button>
        </div>
      </div>

      <div class="section">
        <h3>Extra Features</h3>

        <div class="input-group">
          <button id="uppercaseButton">UPPERCASE</button>

          <button id="lowercaseButton">lowercase</button>

          <button id="resetButton">Reset</button>
        </div>
      </div>

      <div class="footer">Built with HTML, CSS & JavaScript</div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
